name: Scrape Michigan Cash Pop

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        env:
          LOTTERY_URL   : ${{ secrets.MICHIGAN_URL }}
          WEBAPP_URL    : ${{ secrets.MICHIGAN_WEBAPP_URL }}
          SHARED_SECRET : ${{ secrets.MICHIGAN_SECRET }}
        run: python scripts/fetch.py
